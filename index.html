<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>icosahedral</title>
    <style>
      #the-canvas {
        border: 1px solid black;
        height: 600px;
        width: 600px;
      }

      #params {
        margin-block: 2em;
        display: grid;
        column-gap: 1em;
        row-gap: 0.5em;
        grid-template-columns: repeat(3, max-content);
        align-items: start;
        align-content: start;
        justify-content: start;
        justify-items: start;
        > input[type=range] {
          width: 400px;
        }
      }
    </style>
  </head>
  <body>
    <h1>Some polyhedra with icosahedral symmetry</h1>
    <p>
      Inspired by <a
        href="https://mathstodon.xyz/@johncarlosbaez/116589957362204579"
      >this thread by John Carlos Baez</a>
      and <a
        href="https://mathstodon.xyz/@tpfto/116599961926950250"
      >this thread by J.M.</a>
    </p>
    <p>
      Use the UI widgets to define the scene
      and the mouse to rotate/zoom/move it.
    </p>
    <div id="params">
      <label for="figure">figure</label>
      <select id="figure">
        <option selected>icosahedron</option>
        <option>dodecahedron</option>
        <option>great dodecahedron</option>
      </select>
      <span></span>

      <label for="transform">transform</label>
      <input id="transform" type="range" min="0" max="1" step="any" value="0">
      <output id="transform-out"></output>

      <label for="edges">edges</label>
      <input id="edges" type="checkbox" checked>
      <span></span>

      <label for="faces">faces</label>
      <input id="faces" type="checkbox" checked>
      <span></span>

      <label for="axes">axes</label>
      <input id="axes" type="checkbox">
      <span></span>
    </div>
    <canvas id="the-canvas"></canvas>
    <script type="module" src="src/main.ts"></script>
  </body>
</html>
